# Money-Pro 分类规则
# 根据交易对方/商品说明自动分类
#
# 【AI 使用说明 - 匹配算法】
# 1. 将交易对方(counterparty) + 商品说明(product) + 交易类型(trans_type) 拼接为一段文本
# 2. 按 categories 定义顺序遍历（车 → 宠物 → 日常生活）
# 3. 对每个子类别，在其 keywords 列表中逐一检查：关键词是否出现在文本中
# 4. 第一个命中的关键词所在的子类别即为分类结果
# 5. 所有类别都未命中 → 归为 "日常生活 > 其他"
# 6. 收入记录（收支类型=收入）统一归为 "收入 > 收入"，不参与关键词匹配
#
# 优先级原则：定义在前的类别优先匹配（车 > 宠物 > 日常生活）

# 一级分类
categories:
  车:
    - 过路费
    - 能源费用
    - 停车费
    - 车贷月供
    - 保险
    - 车载用品购物
    - 洗车美容
    - 保养维修

  宠物:
    - 主粮零食
    - 玩具
    - 医疗与洗护

  日常生活:
    - 餐饮
    - 购物
    - 医疗
    - 月供
    - 其他

# 关键词映射（用于自动匹配）
keywords:
  # 车
  过路费: [高速, 过路费, ETC, 通行费]
  能源费用: [加油, 油费, 充电, 中石化, 中石油, 壳牌, 电网, 南网]
  停车费: [停车, 拍照, 车位]
  车贷月供: [车贷, 月供, 还款, 分期]
  保险: [车险, 保险, 交强险, 商业险]
  车载用品购物: [车品, 车载, 行车记录仪, 座套, 脚垫, 手机支架]
  洗车美容: [洗车, 打蜡, 抛光, 美容]
  保养维修: [保养, 维修, 换油, 轮胎, 刹车, 机油]

  # 宠物
  主粮零食: [猫粮, 狗粮, 猫条, 罐头, 宠物零食, 猫咪, 狗狗]
  玩具: [猫玩具, 狗玩具, 猫抓板, 逗猫棒, 猫爬架]
  医疗与洗护: [宠物医院, 疫苗, 驱虫, 洗澡, 美容, 宠物诊所]

  # 日常生活
  餐饮: [餐, 食, 吃, 饭, 美团, 饿了么, 外卖, 奶茶, 咖啡, 面包, 麦当劳, 肯德基, 星巴克, 喜茶, 柠茶, 柠檬茶, 烧烤, 自助餐, 早餐, 午餐, 晚餐, 夜宵, 茶百道, 一点点, 蜜雪]
  购物: [商, 超市, 淘宝, 京东, 拼多多, 服装, 鞋, 衣, 日用, 百货, 精品超市, 盒马, 先用后付, 先乘后付]
  医疗: [医, 药, 诊所, 医院, 体检, 挂号, 门诊, 就诊]
  月供: [房租, 话费, 水费, 电费, 燃气, 物业, 宽带, 移动, 电信, 联通, 充值]
